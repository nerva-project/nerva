name: ci/gh-actions/depends

on:
    push:
        branches:
            - master
        paths-ignore:
            - 'docs/**'
            - '**/README.md'
    pull_request:
        paths-ignore:
            - 'docs/**'
            - '**/README.md'
    schedule:
        -   cron: '0 6 * * 1,4'
    workflow_dispatch:

env:
    APT_SET_CONF: |
        tee -a /etc/apt/apt.conf.d/80-custom << EOF
        Acquire::Retries "3";
        Acquire::http::Timeout "120";
        Acquire::ftp::Timeout "120";
        EOF
    CCACHE_SETTINGS: |
        ccache --max-size=500M
        ccache --set-config=compression=true

jobs:
    build-cross:
        runs-on: ubuntu-latest
        container:
            image: ubuntu:20.04
            env:
                DEBIAN_FRONTEND: noninteractive
                CCACHE_TEMPDIR: /tmp/.ccache-temp
        strategy:
            fail-fast: false
            matrix:
                toolchain:
                    -   name: "ARM v7"
                        host: "arm-linux-gnueabihf"
                        packages: "python3 gperf g++-arm-linux-gnueabihf"
                        artifact-name: "nerva-linux-armv7"
                    -   name: "ARM v8"
                        host: "aarch64-linux-gnu"
                        packages: "python3 gperf g++-aarch64-linux-gnu"
                        artifact-name: "nerva-linux-armv8"
                    -   name: "i686 Win"
                        host: "i686-w64-mingw32"
                        packages: "python3 g++-mingw-w64-i686"
                        artifact-name: "nerva-windows-x32"
                    -   name: "i686 Linux"
                        host: "i686-pc-linux-gnu"
                        packages: "gperf cmake g++-multilib python3-zmq"
                        artifact-name: "nerva-linux-i686"
                    -   name: "Win64"
                        host: "x86_64-w64-mingw32"
                        packages: "cmake python3 g++-mingw-w64-x86-64"
                        artifact-name: "nerva-windows-x64"
                    -   name: "x86_64 Linux"
                        host: "x86_64-unknown-linux-gnu"
                        packages: "gperf cmake python3-zmq libdbus-1-dev libharfbuzz-dev"
                        artifact-name: "nerva-linux-x86_64"
                    -   name: "Cross-Mac x86_64"
                        host: "x86_64-apple-darwin"
                        packages: "cmake imagemagick libcap-dev librsvg2-bin libz-dev libbz2-dev libtiff-tools python-dev python3-setuptools-git libtinfo5"
                        artifact-name: "nerva-macos-x64"
                    -   name: "Cross-Mac aarch64"
                        host: "aarch64-apple-darwin"
                        packages: "cmake imagemagick libcap-dev librsvg2-bin libz-dev libbz2-dev libtiff-tools python-dev python3-setuptools-git libtinfo5"
                        artifact-name: "nerva-macos-armv8"
                    -   name: "x86_64 Freebsd"
                        host: "x86_64-unknown-freebsd"
                        packages: "clang-8 gperf cmake python3-zmq libdbus-1-dev libharfbuzz-dev"
                        artifact-name: "nerva-freebsd-x86_64"
                    -   name: "ARMv8 Android"
                        host: "aarch64-linux-android"
                        packages: "gperf cmake python3 unzip python-is-python3"
                        artifact-name: "nerva-android-armv8"
        name: ${{ matrix.toolchain.name }}
        steps:
            -   name: Set apt conf
                run: ${{env.APT_SET_CONF}}
            -   name: Install dependencies
                run: apt update; apt -y install build-essential libtool cmake autotools-dev automake pkg-config bsdmainutils curl git ca-certificates ccache ${{ matrix.toolchain.packages }}
            -   name: Configure git
                run: git config --global --add safe.directory '*'
            -   uses: actions/checkout@v6
                with:
                    fetch-depth: 0
                    submodules: recursive
            -   name: Ccache
                uses: actions/cache@v5
                with:
                    path: ~/.ccache
                    key: ccache-${{ matrix.toolchain.host }}-${{ github.sha }}
                    restore-keys: ccache-${{ matrix.toolchain.host }}-
            -   name: Depends cache
                uses: actions/cache@v5
                with:
                    path: contrib/depends/built
                    key: depends-${{ matrix.toolchain.host }}-${{ hashFiles('contrib/depends/packages/*') }}
                    restore-keys: |
                        depends-${{ matrix.toolchain.host }}-${{ hashFiles('contrib/depends/packages/*') }}
                        depends-${{ matrix.toolchain.host }}-
            -   name: Prepare w64-mingw32
                if: ${{ matrix.toolchain.host == 'x86_64-w64-mingw32' || matrix.toolchain.host == 'i686-w64-mingw32' }}
                run: |
                    update-alternatives --set ${{ matrix.toolchain.host }}-g++ $(which ${{ matrix.toolchain.host }}-g++-posix)
                    update-alternatives --set ${{ matrix.toolchain.host }}-gcc $(which ${{ matrix.toolchain.host }}-gcc-posix)
            -   uses: ./.github/actions/set-make-job-count
            -   name: Build
                run: |
                    ${{env.CCACHE_SETTINGS}}
                    make depends target=${{ matrix.toolchain.host }} -j${{env.MAKE_JOB_COUNT}}
            -   uses: actions/upload-artifact@v7
                if: github.event_name != 'schedule'
                with:
                    name: ${{ matrix.toolchain.artifact-name }}
                    path: |
                        build/${{ matrix.toolchain.host }}/release/bin/nerva*

    # iOS has no Linux cross path (no iphoneos SDK to host), so it builds native on
    # macOS with the runner's Xcode. Deps go through contrib/depends; iOS ships a
    # wallet library (wallet_api), not daemons. We build two slices - arm64 device
    # and arm64 simulator - and bundle them into one .xcframework, since lipo can't
    # combine same-arch/different-platform slices.
    build-ios:
        name: ARMv8 iOS (xcframework)
        runs-on: macos-14
        timeout-minutes: 180
        env:
            DEVICE_HOST: aarch64-apple-ios
            SIM_HOST: aarch64-apple-iossimulator
            ARTIFACT: nerva-ios-armv8
        steps:
            -   name: Install dependencies
                run: brew install autoconf automake libtool pkg-config gperf ccache coreutils
            # macOS runners ship CMake 4.x, which dropped the FindBoost module
            # Nerva needs (it sets Boost_NO_BOOST_CMAKE ON). Pin 3.29 for MODULE mode.
            -   name: Pin CMake 3.29
                run: |
                    CMAKE_VER=3.29.6
                    curl -fsSL "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VER}/cmake-${CMAKE_VER}-macos-universal.tar.gz" -o /tmp/cmake.tar.gz
                    tar -xzf /tmp/cmake.tar.gz -C /tmp
                    echo "/tmp/cmake-${CMAKE_VER}-macos-universal/CMake.app/Contents/bin" >> "$GITHUB_PATH"
            -   uses: actions/checkout@v6
                with:
                    fetch-depth: 0
                    submodules: recursive
            -   name: Ccache
                uses: actions/cache@v5
                with:
                    path: ~/Library/Caches/ccache
                    key: ccache-ios-${{ github.sha }}
                    restore-keys: ccache-ios-
            -   name: Depends cache
                uses: actions/cache@v5
                with:
                    path: contrib/depends/built
                    key: depends-ios-${{ hashFiles('contrib/depends/packages/*') }}
                    restore-keys: depends-ios-
            -   uses: ./.github/actions/set-make-job-count
            -   name: Build device + simulator slices
                run: |
                    ${{env.CCACHE_SETTINGS}}
                    for H in "$DEVICE_HOST" "$SIM_HOST"; do
                        make -C contrib/depends HOST=$H -j${{env.MAKE_JOB_COUNT}}
                        mkdir -p build/$H/release
                        ( cd build/$H/release && \
                          cmake -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/contrib/depends/$H/share/toolchain.cmake ../../.. && \
                          make -j${{env.MAKE_JOB_COUNT}} wallet_api )
                        # one linkable slice: merge project + depends archives, minus
                        # boost's test-only frameworks (unused, and they collide on names)
                        ARCHIVES=$(find "build/$H/release" -name '*.a'; \
                          find "contrib/depends/$H/lib" -name '*.a' \
                            ! -name 'libboost_unit_test_framework.a' \
                            ! -name 'libboost_test_exec_monitor.a')
                        libtool -static -o "build/$H/libnerva_wallet.a" $ARCHIVES
                        # the slice must actually carry the wallet API symbols a
                        # consumer links against (i.e. not empty / stripped)
                        nm "build/$H/libnerva_wallet.a" 2>/dev/null | grep -q WalletManagerFactory \
                          || { echo "no wallet_api symbols in $H slice"; exit 1; }
                    done
            -   name: Assemble xcframework
                run: |
                    STAGE="$GITHUB_WORKSPACE/$ARTIFACT"
                    mkdir -p "$STAGE"
                    # headers-only staging dir, -headers would ship the .cpp files too
                    HDRS="$GITHUB_WORKSPACE/ios-headers"
                    mkdir -p "$HDRS"
                    cp src/wallet/api/*.h "$HDRS/"
                    xcodebuild -create-xcframework \
                        -library "build/$DEVICE_HOST/libnerva_wallet.a" -headers "$HDRS" \
                        -library "build/$SIM_HOST/libnerva_wallet.a"    -headers "$HDRS" \
                        -output "$STAGE/libnerva_wallet.xcframework"
                    printf 'libnerva_wallet.xcframework: arm64 device + arm64 simulator slices.\n' > "$STAGE/README-ios.txt"
            -   name: Verify both slices present
                run: |
                    INFO=$(plutil -p "$ARTIFACT/libnerva_wallet.xcframework/Info.plist")
                    echo "$INFO"
                    echo "$INFO" | grep -q '"ios-arm64"'           || { echo "missing device slice";    exit 1; }
                    echo "$INFO" | grep -q '"ios-arm64-simulator"' || { echo "missing simulator slice"; exit 1; }
            -   uses: actions/upload-artifact@v7
                if: github.event_name != 'schedule'
                with:
                    name: ${{ env.ARTIFACT }}
                    path: ${{ env.ARTIFACT }}/
